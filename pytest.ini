[pytest]
# Add workspace root to python path for clean relative imports
pythonpath = .

# Command line options:
# -v: verbose output
# --tb=short: cleaner short traceback formatting on test failures
# --html=reports/report.html: output standalone html report
# --self-contained-html: package css/images into a single self-contained html report
# --capture=no: allow live prints/logs to be visible in console
addopts = -v --tb=short --html=reports/report.html --self-contained-html --capture=no

# Register custom marks:
markers =
    smoke: Quick execution E2E sanity tests
    regression: Complete regression suite coverage
    login: Login module related tests
    cart: Shopping cart and checkout tests

# Live Logging configurations:
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S
